name: winrar
title: WinRAR (WINE)
summary: WinRAR is a file archiver utility for Windows.
description: |
 It can create and view archives in RAR or ZIP file formats, and unpack numerous archive file formats. It can backup your data and reduce the size of email attachments, open and unpack RAR, ZIP and other archive formats.
adopt-info: winrar

grade: stable
confinement: strict
base: core24
platforms:
  amd64:
compression: lzo
assumes:
  - snapd2.62

plugs:
  shmem:
    interface: shared-memory
    private: true
  wine-runtime-c24:
    interface: content
    target: $SNAP/wine-runtime
    default-provider: wine-platform-runtime-core24
  wine-base-devel:
    interface: content
    target: $SNAP/wine-platform
    default-provider: wine-platform

environment:
  WINEDLLOVERRIDES: "mscoree,mshtml=" # Prevent pop-ups about Wine Mono and Wine Gecko
  RUN_EXE: "$SNAP_USER_DATA/winrar/winrar.exe"
  SOMMELIER_KEEP_CWD: "1" # Don't change the working directory so relative paths still work

apps:
  winrar:
    extensions: [gnome]
    command: bin/sommelier run-exe
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
    desktop: usr/share/applications/winrar.desktop
  # The wine command can be used to run applications inside the wine
  # environment that this snap uses.
  #
  # For example, users can configure the wine environment of this snap
  # by running `myapp.wine winecfg`.
  wine:
    extensions: [gnome]
    command: bin/sommelier
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # The winetricks command can be used to run winetricks inside the wine
  # environment that this snap uses.
  winetricks:
    extensions: [gnome]
    command: bin/sommelier winetricks
    plugs:
      - network
  # used for winrar compress files rightclick menu under files
  wcf:
    extensions: [gnome]
    command: bin/sommelier wcf
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # used for winrar extract files rightclick menu under files
  wef:
    extensions: [gnome]
    command: bin/sommelier wef
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # used for winrar extract to subdir rightclick menu under files
  wefs:
    extensions: [gnome]
    command: bin/sommelier wefs
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # used for winrar extract here rightclick menu under files
  weh:
    extensions: [gnome]
    command: bin/sommelier weh
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # used for winrar quick compress files rightclick menu under files
  wqc:
    extensions: [gnome]
    command: bin/sommelier wqc
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # used for winrar repair compressed files rightclick menu under files
  wra:
    extensions: [gnome]
    command: bin/sommelier wra
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem
  # used for winrar test compressed files rightclick menu under files
  wta:
    extensions: [gnome]
    command: bin/sommelier wta
    plugs:
      - home
      - network
      - cups-control
      - removable-media
      - shmem

parts:
  winrar:
    plugin: nil
    source: ./snap/local/src
    override-build: |
      craftctl default
      set -ex
      craftctl set version=$(wget -qO- https://www.rarlab.com/download.htm | grep ") [0-9]" | sed 's|<| |g' | awk '{print $5}' | head -n1)
      ./dl_wrar
    stage:
      - bin
      - usr
      - wine-platform
      - wine-runtime
      - sommelier
    build-packages: [wget, unrar]
  # The sommelier script helps you snap Windows applications using Wine. It
  # initializes and configures Wine and installs the Windows application.
  sommelier:
    plugin: make
    source: https://github.com/mmtrt/sommelier-core.git
    source-branch: "core24-winrar"
